<div class="min-h-screen bg-navy-950 flex items-center justify-center relative overflow-hidden cyber-grid">
  
  <!-- Glowing neon decorative shapes in background -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyber-blue/15 rounded-full filter blur-[120px] animate-float"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyber-purple/10 rounded-full filter blur-[120px] animate-float" style="animation-delay: -3s;"></div>
  <div class="absolute top-1/2 left-1/2 w-64 h-64 bg-cyber-green/5 rounded-full filter blur-[100px] animate-float" style="animation-delay: -5s;"></div>

  <!-- Floating particles -->
  <div class="particle particle-1"></div>
  <div class="particle particle-2"></div>
  <div class="particle particle-3"></div>
  <div class="particle particle-4"></div>
  <div class="particle particle-5"></div>
  <div class="particle particle-6"></div>
  <div class="particle particle-7"></div>
  <div class="particle particle-8"></div>

  <!-- Side decoration lines -->
  <div class="side-line side-line-left"></div>
  <div class="side-line side-line-right"></div>
  <div class="side-line side-line-left-2"></div>
  <div class="side-line side-line-right-2"></div>

  <!-- Rotating hex patterns -->
  <div class="hex-pattern hex-1"></div>
  <div class="hex-pattern hex-2"></div>

  <!-- Login Card -->
  <div class="glass-panel rounded-3xl shadow-2xl p-10 w-full max-w-md relative z-10 border border-white/10 login-card">

    <!-- Corner accents -->
    <div class="corner-accent corner-tl"></div>
    <div class="corner-accent corner-tr"></div>
    <div class="corner-accent corner-bl"></div>
    <div class="corner-accent corner-br"></div>

    <!-- Scan line -->
    <div class="scan-line"></div>

    <!-- Header with orbiting logo -->
    <div class="text-center mb-8">
      <div class="logo-orbit-container inline-block p-3 rounded-2xl bg-gradient-to-tr from-cyber-blue/20 to-cyber-purple/20 border border-cyber-blue/30 mb-4 logo-glow">
        <div class="orbit-ring"></div>
        <div class="orbit-ring-2"></div>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyber-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <h1 class="text-4xl font-extrabold tracking-tight gradient-text">FleetFlow</h1>
      <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest font-semibold font-display typing-cursor">
        Logistics Control Panel
      </p>
    </div>

    <!-- Error message -->
    <div *ngIf="error" class="bg-red-950/40 border border-red-500/50 text-red-200 px-4 py-3 rounded-xl mb-6 text-sm backdrop-blur-sm flex items-center gap-2">
      <span class="status-dot red"></span>
      {{ error }}
    </div>

    <!-- Form -->
    <div class="space-y-6">
      <div class="field-1">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 font-display">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
          </div>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="admin@fleetflow.com"
            class="login-input w-full pl-10 pr-4 py-3 bg-navy-900/60 border border-white/10 rounded-xl focus:outline-none focus:border-cyber-blue focus:ring-1 focus:ring-cyber-blue text-white placeholder-gray-500 transition-all duration-300"
          />
        </div>
      </div>

      <div class="field-2">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 font-display">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="login-input w-full pl-10 pr-4 py-3 bg-navy-900/60 border border-white/10 rounded-xl focus:outline-none focus:border-cyber-blue focus:ring-1 focus:ring-cyber-blue text-white placeholder-gray-500 transition-all duration-300"
          />
        </div>
      </div>

      <div class="field-3">
        <button
          (click)="login()"
          [disabled]="loading"
          class="btn-shimmer w-full gradient-btn text-white font-bold py-3.5 rounded-xl transition duration-300 disabled:opacity-40 disabled:cursor-not-allowed uppercase tracking-wider text-sm shadow-lg shadow-cyber-blue/15 hover:shadow-cyber-blue/25">
          <span class="flex items-center justify-center gap-2">
            <span *ngIf="loading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            {{ loading ? 'Processing...' : 'Establish Connection' }}
          </span>
        </button>
      </div>
    </div>

    <!-- Footer status -->
    <div class="flex items-center justify-center gap-2 mt-8 text-xs text-gray-500 font-display">
      <span class="status-dot green"></span>
      <span>System Online</span>
      <span class="mx-1">•</span>
      <span>Secure Channel</span>
    </div>

  </div>
</div>
